<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <title>כניסה — גד"ש</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #1a2f4e 0%, #2a4a72 60%, #3a6fa8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Arial Hebrew', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .login-logo { font-size: 2.5rem; margin-bottom: .3rem; }
    .login-title { font-size: 1.3rem; font-weight: 700; color: #1a2f4e; margin-bottom: .1rem; }
    .login-sub { font-size: .82rem; color: #64748b; margin-bottom: 1.5rem; }
    .form-label { font-weight: 600; font-size: .88rem; color: #374151; }
    .btn-login { background: #1a2f4e; border: none; font-weight: 600; width: 100%; padding: .65rem; border-radius: 9px; }
    .btn-login:hover { background: #2a4a72; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="login-logo">🌾</div>
    <div class="login-title">גד"ש — ניהול עבודות</div>
    <div class="login-sub">מערכת ניהול עבודות שדה חקלאיות</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 mb-3 text-start" role="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" class="text-start">
      <div class="mb-3">
        <label class="form-label">סיסמה</label>
        <input type="password" name="password" class="form-control" placeholder="הכנס סיסמה" autofocus required />
      </div>
      <button type="submit" class="btn btn-primary btn-login">כניסה למערכת</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
