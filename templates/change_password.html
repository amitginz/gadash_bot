<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>שינוי סיסמה — גד"ש</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <style>
    body { background: #f5f7fa; font-family: 'Segoe UI', 'Arial Hebrew', sans-serif; }
    .top-nav { background: #1a2f4e; padding: .7rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .top-nav .brand { color: #fff; font-weight: 700; font-size: 1.1rem; text-decoration: none; }
    .top-nav a { color: rgba(255,255,255,.75); text-decoration: none; font-size: .85rem; margin-inline-start: 1.2rem; }
    .form-card { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08); padding: 2rem; max-width: 440px; margin: 3rem auto; }
    .form-label { font-weight: 600; font-size: .88rem; color: #374151; }
    .btn-primary { background: #1a2f4e; border-color: #1a2f4e; }
    .btn-primary:hover { background: #2a4a72; border-color: #2a4a72; }
  </style>
</head>
<body>

<nav class="top-nav">
  <a class="brand" href="/">🌾 גד"ש — ניהול עבודות</a>
  <div>
    <a href="/">ראשי</a>
  </div>
</nav>

<div class="container">
  <div class="form-card">
    <h5 class="fw-bold mb-4">🔐 שינוי סיסמה</h5>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }} py-2 mb-3" role="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">סיסמה נוכחית</label>
        <input type="password" name="old_password" class="form-control" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label">סיסמה חדשה</label>
        <input type="password" name="new_password" class="form-control" minlength="4" required />
      </div>
      <div class="mb-4">
        <label class="form-label">אימות סיסמה חדשה</label>
        <input type="password" name="confirm_password" class="form-control" minlength="4" required />
      </div>
      <div class="alert alert-warning py-2 small mb-3">
        ⚠️ השינוי תקף עד הפעלה מחדש. לשינוי קבוע — עדכן את <code>WEB_PASSWORD</code> ב-Fly.io secrets.
      </div>
      <div class="d-flex justify-content-between">
        <a href="/" class="btn btn-outline-secondary">← חזור</a>
        <button type="submit" class="btn btn-primary px-4">שמור סיסמה</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
