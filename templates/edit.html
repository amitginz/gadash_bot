<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>עריכת רשומה — גד"ש</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <style>
    body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
    .page-header { background: linear-gradient(135deg, #1e3a5f, #2d6a9f); color: white; padding: 2rem 0 1.5rem; margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .form-card { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 2rem; max-width: 640px; margin: 0 auto; }
    .form-label { font-weight: 600; font-size: 0.9rem; color: #374151; }
    .btn-primary { background: #1e3a5f; border-color: #1e3a5f; }
    .btn-primary:hover { background: #2d6a9f; border-color: #2d6a9f; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#1e3a5f;">
  <div class="container">
    <a class="navbar-brand" href="/" style="font-weight:700;">🌾 גד"ש — ניהול עבודות</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>✏️ עריכת רשומה</h1>
  </div>
</div>

<div class="container pb-5">
  <div class="form-card">
    <form method="POST">
      <div class="row g-3">
        {% for key, value in row.items() %}
        <div class="col-sm-6">
          <label class="form-label">{{ key }}</label>
          <input type="text" class="form-control" name="{{ key }}" value="{{ value }}" />
        </div>
        {% endfor %}
      </div>

      <div class="d-flex justify-content-between align-items-center mt-4">
        <div class="d-flex gap-2">
          <a href="/" class="btn btn-outline-secondary">← חזור</a>
          <button
            type="button"
            class="btn btn-outline-danger"
            onclick="confirmDelete({{ row_id }})"
          >🗑️ מחק</button>
        </div>
        <button type="submit" class="btn btn-primary px-4">שמור שינויים</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title">אישור מחיקה</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-1">האם למחוק את הרשומה? פעולה זו אינה ניתנת לביטול.</div>
      <div class="modal-footer border-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">ביטול</button>
        <a id="deleteConfirmBtn" href="#" class="btn btn-danger btn-sm">מחק</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function confirmDelete(rowId) {
    document.getElementById('deleteConfirmBtn').href = '/delete/' + rowId;
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
  }
</script>
</body>
</html>
