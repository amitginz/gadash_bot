<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>הוספת רשומה — גד"ש</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <style>
    body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
    .page-header { background: linear-gradient(135deg, #1e3a5f, #2d6a9f); color: white; padding: 2rem 0 1.5rem; margin-bottom: 2rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    .form-card { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 2rem; max-width: 640px; margin: 0 auto; }
    .form-label { font-weight: 600; font-size: 0.9rem; color: #374151; }
    .btn-primary { background: #1e3a5f; border-color: #1e3a5f; }
    .btn-primary:hover { background: #2d6a9f; border-color: #2d6a9f; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark" style="background:#1e3a5f;">
  <div class="container">
    <a class="navbar-brand" href="/" style="font-weight:700;">🌾 גד"ש — ניהול עבודות</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>➕ הוספת רשומה חדשה</h1>
  </div>
</div>

<div class="container pb-5">
  <div class="form-card">

    {% if success %}
    <div class="alert alert-success text-center mb-4">✅ הרשומה נוספה בהצלחה!</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger mb-4">⚠️ שגיאה: {{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">שם לקוח *</label>
          <input type="text" class="form-control" name="שם לקוח" required placeholder="הכנס שם לקוח" />
        </div>
        <div class="col-sm-6">
          <label class="form-label">תאריך *</label>
          <input type="date" class="form-control" name="תאריך" required value="{{ today }}" />
        </div>
        <div class="col-sm-6">
          <label class="form-label">עבודה *</label>
          <select class="form-select" name="עבודה" required>
            <option value="">בחר סוג עבודה…</option>
            <option>חריש</option>
            <option>ריסוס</option>
            <option>קציר</option>
            <option>דיסוק</option>
            <option>אחר</option>
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label">שם חלקה</label>
          <input type="text" class="form-control" name="שם חלקה" placeholder="לדוג׳ חלקה ב׳" />
        </div>
        <div class="col-sm-6">
          <label class="form-label">כמות</label>
          <input type="text" class="form-control" name="כמות" placeholder="לדוג׳ 30 דונם" />
        </div>
        <div class="col-sm-6">
          <label class="form-label">כלי</label>
          <input type="text" class="form-control" name="כלי" placeholder="לדוג׳ טרקטור" />
        </div>
        <div class="col-sm-6">
          <label class="form-label">מפעיל</label>
          <input type="text" class="form-control" name="מפעיל" placeholder="שם המפעיל" />
        </div>
        <div class="col-12">
          <label class="form-label">הערות</label>
          <textarea class="form-control" name="הערות" rows="3" placeholder="הערות נוספות אם יש"></textarea>
        </div>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <a href="/" class="btn btn-outline-secondary">← חזור</a>
        <button type="submit" class="btn btn-primary px-4">שמור רשומה</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
