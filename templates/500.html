<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>שגיאת שרת — גד"ש</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <style>
    :root { --navy:#1a2f4e; }
    body { background:#f5f7fa; font-family:'Segoe UI','Arial Hebrew',sans-serif; }
    .err-box { max-width:480px; margin:10vh auto; text-align:center; }
    .err-code { font-size:5rem; font-weight:800; color:#c0392b; line-height:1; }
    .err-msg  { font-size:1.2rem; color:#555; margin:.5rem 0 2rem; }
  </style>
</head>
<body>
<div class="err-box px-3">
  <div class="err-code">500</div>
  <div class="err-msg">אירעה שגיאה בשרת — אנחנו על זה 🔧</div>
  <a href="/" class="btn btn-primary px-4">חזרה לדף הראשי</a>
</div>
</body>
</html>
